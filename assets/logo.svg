<?xml version="1.0" encoding="UTF-8"?>
<!--
  Wormageddon — project emblem.
  A sandworm rising from the dunes inside a "control ring" of gear teeth,
  signalling the project's purpose: turning the dials on a Dune: Awakening
  dedicated server (worm sign, threat, sandstorms, difficulty).
  Pure hand-authored SVG, no external assets, theme-independent colors.
-->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wormageddon logo">
  <defs>
    <!-- Spice glow used behind the worm maw -->
    <radialGradient id="spice" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#FFD27A"/>
      <stop offset="45%" stop-color="#E8862E"/>
      <stop offset="100%" stop-color="#7A3B0E"/>
    </radialGradient>
    <!-- Night-desert sky -->
    <radialGradient id="sky" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#2A1C3A"/>
      <stop offset="60%" stop-color="#1B1228"/>
      <stop offset="100%" stop-color="#0E0A16"/>
    </radialGradient>
    <!-- Worm body, segmented sand tones -->
    <linearGradient id="worm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E2B873"/>
      <stop offset="55%" stop-color="#B6843C"/>
      <stop offset="100%" stop-color="#6E4A1E"/>
    </linearGradient>
    <linearGradient id="dune" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D8A24A"/>
      <stop offset="100%" stop-color="#8A5E22"/>
    </linearGradient>
  </defs>

  <!-- Badge background -->
  <circle cx="256" cy="256" r="248" fill="url(#sky)" stroke="#E8862E" stroke-width="6"/>

  <!-- Control ring: gear teeth around the rim = "settings you turn" -->
  <g fill="#E8862E" opacity="0.9">
    <g id="tooth-set">
      <!-- 24 teeth generated by rotation -->
      <rect x="250" y="14" width="12" height="22" rx="3"/>
    </g>
    <use href="#tooth-set" transform="rotate(15 256 256)"/>
    <use href="#tooth-set" transform="rotate(30 256 256)"/>
    <use href="#tooth-set" transform="rotate(45 256 256)"/>
    <use href="#tooth-set" transform="rotate(60 256 256)"/>
    <use href="#tooth-set" transform="rotate(75 256 256)"/>
    <use href="#tooth-set" transform="rotate(90 256 256)"/>
    <use href="#tooth-set" transform="rotate(105 256 256)"/>
    <use href="#tooth-set" transform="rotate(120 256 256)"/>
    <use href="#tooth-set" transform="rotate(135 256 256)"/>
    <use href="#tooth-set" transform="rotate(150 256 256)"/>
    <use href="#tooth-set" transform="rotate(165 256 256)"/>
    <use href="#tooth-set" transform="rotate(180 256 256)"/>
    <use href="#tooth-set" transform="rotate(195 256 256)"/>
    <use href="#tooth-set" transform="rotate(210 256 256)"/>
    <use href="#tooth-set" transform="rotate(225 256 256)"/>
    <use href="#tooth-set" transform="rotate(240 256 256)"/>
    <use href="#tooth-set" transform="rotate(255 256 256)"/>
    <use href="#tooth-set" transform="rotate(270 256 256)"/>
    <use href="#tooth-set" transform="rotate(285 256 256)"/>
    <use href="#tooth-set" transform="rotate(300 256 256)"/>
    <use href="#tooth-set" transform="rotate(315 256 256)"/>
    <use href="#tooth-set" transform="rotate(330 256 256)"/>
    <use href="#tooth-set" transform="rotate(345 256 256)"/>
  </g>

  <!-- Clip the scene to the inner badge -->
  <clipPath id="inner"><circle cx="256" cy="256" r="214"/></clipPath>
  <g clip-path="url(#inner)">
    <!-- Spice haze behind the worm -->
    <circle cx="256" cy="232" r="150" fill="url(#spice)" opacity="0.55"/>

    <!-- Worm body: a curved, segmented column rising from the sand -->
    <path d="M256 470
             C 214 430 214 392 240 360
             C 262 332 250 300 232 280
             C 256 296 280 300 290 276
             C 300 250 286 232 270 218
             L 256 196
             L 242 218
             C 226 232 212 250 222 276
             C 232 300 256 296 280 280
             C 262 300 250 332 272 360
             C 298 392 298 430 256 470 Z"
          fill="url(#worm)" stroke="#3A260E" stroke-width="4"/>

    <!-- Segment rings on the body -->
    <g stroke="#3A260E" stroke-width="3" opacity="0.6" fill="none">
      <path d="M232 360 q24 14 48 0"/>
      <path d="M236 410 q20 12 40 0"/>
      <path d="M240 440 q16 10 32 0"/>
    </g>

    <!-- The maw: open round mouth ringed with crysknife teeth -->
    <circle cx="256" cy="178" r="60" fill="#1A0E06"/>
    <circle cx="256" cy="178" r="60" fill="url(#spice)" opacity="0.35"/>
    <g fill="#F0E2C2">
      <!-- ring of triangular teeth pointing inward -->
      <g id="fang"><polygon points="256,124 248,150 264,150"/></g>
      <use href="#fang" transform="rotate(30 256 178)"/>
      <use href="#fang" transform="rotate(60 256 178)"/>
      <use href="#fang" transform="rotate(90 256 178)"/>
      <use href="#fang" transform="rotate(120 256 178)"/>
      <use href="#fang" transform="rotate(150 256 178)"/>
      <use href="#fang" transform="rotate(180 256 178)"/>
      <use href="#fang" transform="rotate(210 256 178)"/>
      <use href="#fang" transform="rotate(240 256 178)"/>
      <use href="#fang" transform="rotate(270 256 178)"/>
      <use href="#fang" transform="rotate(300 256 178)"/>
      <use href="#fang" transform="rotate(330 256 178)"/>
    </g>
    <circle cx="256" cy="178" r="26" fill="#0A0603"/>

    <!-- Foreground dunes -->
    <path d="M-20 380 C 80 350 150 410 256 392 C 360 374 430 420 540 388 L540 540 L-20 540 Z" fill="url(#dune)"/>
    <path d="M-20 440 C 110 410 180 470 300 448 C 410 428 470 470 540 452 L540 560 L-20 560 Z" fill="#5E3F18"/>
  </g>
</svg>
